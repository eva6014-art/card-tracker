<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信用卡回饋追蹤 Pro</title>

<style>
body{font-family:Arial;background:#f4f6ff;margin:0}
.container{max-width:520px;margin:auto;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
h2{margin-bottom:10px}
button{padding:10px;border:none;border-radius:8px;background:#7c6cfc;color:#fff;cursor:pointer}
input,select{width:100%;padding:10px;margin:6px 0 12px}
.small{font-size:12px;color:#666}
</style>
</head>

<body>
<div class="container">

<h2>💳 信用卡回饋追蹤 Pro</h2>

<div class="card">
<h3>新增消費</h3>
<input id="amount" type="number" placeholder="金額">
<select id="card"></select>
<button id="addBtn">新增</button>
</div>

<div class="card">
<h3>卡片回饋概況</h3>
<div id="summary"></div>
</div>

<div class="card">
<h3>消費紀錄</h3>
<div id="records"></div>
</div>

</div>

<script>

// ===== 資料 =====
const defaultCards = [
{
id:'sport',
name:'永豐Sport卡',
tiers:[
{rate:1,cap:Infinity},
{rate:1,cap:50,min:5000},
{rate:3,cap:300,min:10000}
]
},
{
id:'dawho',
name:'永豐大戶卡',
tiers:[
{rate:4.5,cap:Infinity}
]
}
];

let cards = JSON.parse(localStorage.getItem("cards")||"null") || defaultCards;
let records = JSON.parse(localStorage.getItem("records")||"[]");

// ===== 儲存 =====
function save(){
localStorage.setItem("cards",JSON.stringify(cards));
localStorage.setItem("records",JSON.stringify(records));
}

// ===== 計算回饋 =====
function calcReward(card,totalSpend){
let total = 0;

card.tiers.forEach(t=>{
if(t.min && totalSpend < t.min) return;

let reward = totalSpend * (t.rate/100);
if(t.cap !== Infinity) reward = Math.min(reward, t.cap);

total += reward;
});

return total;
}

// ===== UI =====
function renderCards(){
const sel = document.getElementById("card");
sel.innerHTML = cards.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
}

function renderSummary(){
const el = document.getElementById("summary");

let html = "";

cards.forEach(c=>{
let spend = records
.filter(r=>r.cardId===c.id)
.reduce((s,r)=>s+r.amount,0);

let reward = calcReward(c,spend);

html += `
<div style="margin-bottom:10px">
<b>${c.name}</b><br>
<span class="small">消費：$${spend}</span><br>
<span class="small">回饋：約 $${Math.round(reward)}</span>
</div>
`;
});

el.innerHTML = html;
}

function renderRecords(){
const el = document.getElementById("records");

if(!records.length){
el.innerHTML="尚無紀錄";
return;
}

el.innerHTML = records.map(r=>`
<div style="border-bottom:1px solid #eee;padding:8px 0">
<b>$${r.amount}</b> - ${getCardName(r.cardId)}
<button onclick="del(${r.id})" style="background:#f43f5e;margin-left:10px">刪除</button>
</div>
`).join("");
}

function getCardName(id){
return cards.find(c=>c.id===id)?.name || "未知卡";
}

// ===== 行為 =====
document.getElementById("addBtn").onclick = ()=>{
const amt = Number(document.getElementById("amount").value);
const cardId = document.getElementById("card").value;

if(!amt) return alert("請輸入金額");

records.unshift({
id:Date.now(),
amount:amt,
cardId
});

save();
render();
document.getElementById("amount").value="";
};

function del(id){
records = records.filter(r=>r.id!==id);
save();
render();
}

// ===== 初始化 =====
function render(){
renderCards();
renderSummary();
renderRecords();
}

render();

</script>
</body>
</html>
