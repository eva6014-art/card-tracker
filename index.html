<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>💳 信用卡回饋追蹤</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f4ff;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=date]::-webkit-calendar-picker-indicator{filter:opacity(.5)}
    input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;background:none;width:22px;height:22px;border-radius:50%}
    input[type=color]::-webkit-color-swatch-wrapper{padding:0}
    input[type=color]::-webkit-color-swatch{border:none;border-radius:50%}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f0f4ff}::-webkit-scrollbar-thumb{background:#d0d8ff;border-radius:2px}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .up{animation:up .3s ease forwards}.fade{animation:fade .2s ease}
    button{font-family:'Noto Sans TC',sans-serif;cursor:pointer}
    input{font-family:'Noto Sans TC',sans-serif}
    button:active{transform:scale(.97)}
    #app{display:flex;justify-content:center;min-height:100vh}
    #main{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh}
    #header{background:linear-gradient(135deg,#7c6cfc,#38b6ff);padding:24px 20px 20px;position:relative;overflow:hidden}
    #header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12);pointer-events:none}
    .month-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .mbtn{background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center}
    #mlabel{font-size:15px;font-weight:700;color:white;flex:1}
    .stats{display:flex}.stat{flex:1;text-align:center}
    .sval{font-size:20px;font-weight:900;color:white;letter-spacing:-1px}
    .slbl{font-size:10px;color:rgba(255,255,255,.7);margin-top:3px;letter-spacing:1px}
    #sind{display:flex;justify-content:flex-end;margin-top:10px;min-height:16px;font-size:11px}
    #nav{display:flex;background:white;border-bottom:1px solid #d0d8ff;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px #7c6cfc18}
    .nb{flex:1;padding:12px 0 10px;background:none;border:none;color:#8b93c8;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2.5px solid transparent;font-weight:400;transition:color .15s;font-size:10px}
    .nb.on{color:#7c6cfc;border-bottom-color:#7c6cfc;font-weight:700}
    .ni{font-size:18px;line-height:1}
    #content{flex:1;padding:16px 14px 48px}
    .sl{font-size:11px;font-weight:700;letter-spacing:2px;color:#8b93c8;text-transform:uppercase;margin-bottom:10px}
    .sl.mt{margin-top:20px}
    .cb{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff;opacity:0}
    .ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .cch{font-size:11px;color:#8b93c8;margin-top:6px}
    .rw{position:relative}.rpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
    .rrow{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
    .ramt{font-size:26px;font-weight:900}.rsub{font-size:11px;color:#8b93c8}
    .rlbl{font-size:13px;font-weight:700;text-align:right}.rlbl2{font-size:11px;color:#8b93c8;margin-top:2px;text-align:right}
    .pt{height:6px;background:#e8eeff;border-radius:3px;overflow:hidden;margin-bottom:10px}
    .pf{height:100%;border-radius:3px;transition:width .6s ease}
    .cf{display:flex;justify-content:space-between;font-size:11px;color:#8b93c8}
    .badge{display:inline-flex;align-items:center;border-radius:20px;font-size:12px;font-weight:700;padding:4px 14px;border:1px solid}
    .bsm{font-size:10px;padding:2px 8px}
    .cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .ccell{background:white;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff}
    .fl{font-size:11px;color:#8b93c8;font-weight:600;letter-spacing:1px;display:block;margin-bottom:6px}
    .fi{width:100%;background:white;border:1.5px solid #d0d8ff;border-radius:12px;padding:13px 14px;color:#1e1b4b;font-size:15px;outline:none}
    .fi:focus{border-color:#7c6cfc;box-shadow:0 0 0 3px #7c6cfc22}
    .cr{display:flex;flex-wrap:wrap;gap:6px}
    .chip{padding:7px 14px;border-radius:20px;border:1.5px solid #d0d8ff;background:white;color:#4b5080;font-size:12px;font-weight:400;transition:all .15s}
    .chip.on{background:#7c6cfc;border-color:#7c6cfc;color:white;font-weight:700;box-shadow:0 2px 8px #7c6cfc44}
    .sbtn{background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;color:white;border-radius:14px;padding:16px;font-size:15px;font-weight:800;width:100%;letter-spacing:2px;box-shadow:0 4px 20px #7c6cfc44}
    .abtn{background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:10px;padding:8px 16px;color:white;font-size:12px;font-weight:700;box-shadow:0 2px 10px #7c6cfc44}
    .csel{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:14px;border:1.5px solid #d0d8ff;background:white;width:100%;text-align:left;transition:all .15s;box-shadow:0 2px 12px #7c6cfc18;margin-bottom:8px}
    .ri{display:flex;align-items:center;gap:12px;background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px #7c6cfc18;border-left:4px solid}
    .rl{flex:1}.rm{display:flex;align-items:center;gap:8px;margin-bottom:4px}.rd{font-size:10px;color:#8b93c8;margin-left:auto}
    .smb{border-radius:16px;padding:14px;margin-bottom:14px;border:1.5px solid}
    .smo{margin-top:10px;border-top:1px solid #d0d8ff;padding-top:10px}
    .mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .mc{text-align:center;background:#f0f4ff;border-radius:10px;padding:8px 4px}
    .mi{font-size:11px;color:#8b93c8;line-height:1.9;margin-top:4px}
    .cat-mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    .camc{background:white;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff}
    .dcard{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff;display:flex;justify-content:space-between;align-items:center}
    .dbtn{width:100%;background:white;border-radius:14px;padding:14px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
    .sh{background:#f0f4ff;border-radius:24px 24px 0 0;width:100%;max-width:480px;box-shadow:0 -8px 40px #7c6cfc22;border:1px solid #d0d8ff;max-height:92vh;display:flex;flex-direction:column}
    .shd{display:flex;justify-content:center;padding:12px 0 4px}.shdb{width:36px;height:4px;border-radius:2px;background:#d0d8ff}
    .shh{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 14px;border-bottom:1px solid #d0d8ff}
    .sht{font-size:17px;font-weight:800;color:#1e1b4b}
    .shc{background:#e8eeff;border:none;color:#4b5080;width:28px;height:28px;border-radius:8px;font-size:16px}
    .shb{flex:1;overflow-y:auto;padding:14px 16px 8px}
    .shf{display:flex;gap:10px;padding:12px 16px 24px;border-top:1px solid #d0d8ff}
    .sinp{width:100%;background:white;border:1.5px solid #d0d8ff;border-radius:10px;padding:11px 12px;color:#1e1b4b;font-size:14px;outline:none}
    .sinp.err{border-color:#f43f5e}.ferr{font-size:11px;color:#f43f5e;margin-top:3px}
    .hb{font-size:12px;color:#7c6cfc;background:#7c6cfc12;border:1px solid #7c6cfc30;border-radius:10px;padding:9px 14px;margin-bottom:10px}
    .cancbtn{flex:1;background:#e8eeff;border:none;border-radius:12px;padding:14px 0;color:#4b5080;font-size:14px;font-weight:700}
    .savbtn{flex:2;background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:12px;padding:14px 0;color:white;font-size:14px;font-weight:800;box-shadow:0 4px 16px #7c6cfc44}
    .delbtn{background:white;border:1.5px solid rgba(244,63,94,.3);border-radius:12px;padding:12px 14px;color:#f43f5e;font-size:13px;font-weight:700}
    .cdot{width:22px;height:22px;border-radius:50%;border:2.5px solid transparent}.cdot.sel{border-color:#333}
    .emb{width:56px;height:52px;border-radius:12px;border:1.5px solid #d0d8ff;background:white;font-size:24px;display:flex;align-items:center;justify-content:center}
    .emp{position:absolute;top:60px;left:0;background:white;border:1px solid #d0d8ff;border-radius:16px;padding:10px;z-index:20;width:240px;display:flex;flex-wrap:wrap;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
    .emo{width:34px;height:34px;border-radius:8px;border:none;background:transparent;font-size:18px;cursor:pointer}.emo.sel{background:#e8eeff}
    .conf{background:white;border-radius:20px;padding:28px;width:300px;box-shadow:0 8px 40px rgba(0,0,0,.12)}
    .empty{text-align:center;color:#8b93c8;padding:60px 20px;line-height:2}
    .gbtn{margin-top:16px;background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:12px;padding:10px 24px;color:white;font-size:13px;font-weight:700;box-shadow:0 4px 16px #7c6cfc44}
    #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;color:white;z-index:3000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15);display:none;animation:up .2s ease}
  </style>
</head>
<body>
<div id="app"><div id="main">
  <div id="header">
    <div class="month-row">
      <button class="mbtn" id="pm">‹</button>
      <span id="mlabel"></span>
      <button class="mbtn" id="nm">›</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="sval" id="hs">$0</div><div class="slbl">本月消費</div></div>
      <div class="stat"><div class="sval" id="hr">$0</div><div class="slbl">累積回饋</div></div>
      <div class="stat"><div class="sval" id="hc">0</div><div class="slbl">消費筆數</div></div>
    </div>
    <div id="sind"></div>
  </div>
  <nav id="nav">
    <button class="nb on" data-v="home"><span class="ni">▦</span>總覽</button>
    <button class="nb" data-v="add"><span class="ni">⊕</span>記帳</button>
    <button class="nb" data-v="history"><span class="ni">≡</span>紀錄</button>
    <button class="nb" data-v="cards"><span class="ni">◈</span>管理</button>
  </nav>
  <div id="content"></div>
</div></div>
<div id="toast"></div>
<input type="file" id="fimp" accept=".json" style="display:none">
<script>
const C={primary:'#7c6cfc',accent:'#38b6ff',pink:'#f472b6',text:'#1e1b4b',text2:'#4b5080',text3:'#8b93c8',danger:'#f43f5e',warn:'#f59e0b',ok:'#10b981',bg:'#f0f4ff',bg3:'#e8eeff',border:'#d0d8ff'};
const EMOJIS=['🍜','🍣','☕','🍺','🛍','👗','👟','💄','🚇','🚗','⛽','✈️','🛒','🏬','🏪','🏦','🎬','🎮','🎵','📚','💊','🏥','🏋️','⛳','📱','💻','🖥️','📷','🎁','💍','🏠','🔧','🌿','🐾','📦','💰','🍎','🛞','🧴','🧾','🎓','🏖️','🚿','🪴','🐶'];
const DCATS=[{id:'dining',emoji:'🍜',name:'餐飲',channels:['all','dining'],builtIn:true},{id:'shopping',emoji:'🛍',name:'購物',channels:['all','online'],builtIn:true},{id:'online',emoji:'💻',name:'網購',channels:['all','online'],builtIn:true},{id:'transport',emoji:'🚇',name:'交通',channels:['all'],builtIn:true},{id:'grocery',emoji:'🛒',name:'超市',channels:['all','supermarket'],builtIn:true},{id:'department',emoji:'🏬',name:'百貨',channels:['all'],builtIn:true},{id:'wholesale',emoji:'🏪',name:'量販',channels:['all','supermarket'],builtIn:true},{id:'gas',emoji:'⛽',name:'加油',channels:['all'],builtIn:true},{id:'entertainment',emoji:'🎬',name:'娛樂',channels:['all','online'],builtIn:true},{id:'linepay',emoji:'📱',name:'LINE Pay',channels:['all','linepay'],builtIn:true},{id:'applepay',emoji:'🍎',name:'Apple Pay',channels:['all'],builtIn:true},{id:'jkopay',emoji:'🏪',name:'街口',channels:['all','jkopay'],builtIn:true},{id:'other',emoji:'📦',name:'其他',channels:['all'],builtIn:true}];
const CHOPTS=[{id:'all',l:'所有通路'},{id:'online',l:'網路消費'},{id:'linepay',l:'LINE Pay'},{id:'jkopay',l:'街口支付'},{id:'supermarket',l:'超市/量販'},{id:'dining',l:'餐飲消費'}];
const CYOPTS=[{id:'monthly',l:'每月重置'},{id:'quarterly',l:'每季重置'},{id:'yearly',l:'每年重置'}];
const APS=['#38b6ff','#7c6cfc','#f472b6','#06c87a','#f59e0b','#f43f5e','#34d399','#fbbf24','#60a5fa','#a78bfa','#fb7185','#4ade80'];
const BPS=['#1e3a5f','#2d1b69','#5b0e2d','#064e3b','#1e1b4b','#0c4a6e','#3b0764','#052e16'];
const DCARDS=[{id:'fen',name:'永豐大戶卡',bank:'永豐銀行',color:'#1e3a5f',accent:'#38b6ff',rate:2.5,cap:400,cycle:'monthly',resetDay:1,channels:['all'],channelLabel:'所有通路',note:'每月回饋上限 $400'},{id:'lp',name:'LINE Pay 卡',bank:'中國信託',color:'#2d1b69',accent:'#7c6cfc',rate:3.0,cap:500,cycle:'monthly',resetDay:1,channels:['linepay'],channelLabel:'LINE Pay 消費',note:'僅限 LINE Pay 付款'},{id:'jko',name:'街口聯名卡',bank:'第一銀行',color:'#5b0e2d',accent:'#f472b6',rate:2.0,cap:300,cycle:'monthly',resetDay:1,channels:['jkopay'],channelLabel:'街口支付',note:'僅限街口支付'},{id:'ubt',name:'Ubot 鈦金卡',bank:'聯邦銀行',color:'#064e3b',accent:'#34d399',rate:2.2,cap:600,cycle:'monthly',resetDay:1,channels:['online'],channelLabel:'網路消費',note:'網路刷卡 2.2%'}];
const K={ca:'ct_ca6',re:'ct_re6',ct:'ct_ct6',ls:'ct_ls6'};
const lg=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const ls=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const nm=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const td=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9);
const f$=n=>'$'+Math.round(n).toLocaleString('zh-TW');
const fd=d=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`;};
const ft=d=>{if(!d)return'';const dt=new Date(d);return`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;};
const ms=c=>c.cap/(c.rate/100);
function getSmp(){const m=nm();return[{id:1,cardId:'fen',amount:3200,catId:'online',note:'momo購物',date:`${m}-05`},{id:2,cardId:'fen',amount:5500,catId:'dining',note:'家族聚餐',date:`${m}-10`},{id:3,cardId:'lp',amount:420,catId:'linepay',note:'LINE Pay 早午餐',date:`${m}-12`},{id:4,cardId:'jko',amount:1280,catId:'wholesale',note:'好市多',date:`${m}-14`},{id:5,cardId:'ubt',amount:2400,catId:'online',note:'蝦皮購物',date:`${m}-16`},{id:6,cardId:'fen',amount:1800,catId:'gas',note:'加油',date:`${m}-18`},{id:7,cardId:'lp',amount:3600,catId:'applepay',note:'Apple Pay 百貨',date:`${m}-20`}];}
let S={cards:lg(K.ca,DCARDS),recs:lg(K.re,getSmp()),cats:lg(K.ct,DCATS),view:'home',month:nm(),form:{cardId:'',amt:'',catId:'dining',note:'',date:td()}};
if(S.cards.length&&!S.form.cardId)S.form.cardId=S.cards[0].id;
let svt=null,svs='idle';
function save(){svs='saving';rsi();clearTimeout(svt);svt=setTimeout(()=>{ls(K.ca,S.cards);ls(K.re,S.recs);ls(K.ct,S.cats);localStorage.setItem(K.ls,new Date().toISOString());svs='saved';rsi();setTimeout(()=>{svs='idle';rsi();},2000);},800);}
function rsi(){const el=document.getElementById('sind');if(!el)return;if(svs==='saving')el.innerHTML=`<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.7)"><span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;animation:pulse 1s infinite"></span>儲存中…</span>`;else if(svs==='saved')el.innerHTML=`<span style="font-size:11px;color:#84ffda">✓ 已自動存檔</span>`;else{const t=localStorage.getItem(K.ls);el.innerHTML=t?`<span style="font-size:11px;color:rgba(255,255,255,.6)">上次存檔 ${ft(new Date(t))}</span>`:''}}
let tt;
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='err'?C.danger:type==='warn'?C.warn:C.ok;el.style.display='block';clearTimeout(tt);tt=setTimeout(()=>el.style.display='none',2600);}
function ring(prog,size,col){const s=6,r=(size-s)/2,ci=2*Math.PI*r,co=prog>=1?C.danger:prog>0.8?C.warn:col,off=ci*(1-Math.min(prog,1));return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${C.bg3}" stroke-width="${s}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${co}" stroke-width="${s}" stroke-dasharray="${ci}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/></svg>`;}
function badge(card,sm){return`<span class="badge${sm?' bsm':''}" style="background:${card.color};color:${card.accent};border-color:${card.accent}55;box-shadow:0 2px 8px ${card.accent}22">${card.name}</span>`;}
function cstat(card){const r=S.recs.filter(x=>x.cardId===card.id&&x.date.startsWith(S.month));const sp=r.reduce((s,x)=>s+x.amount,0),rw=Math.min(sp*(card.rate/100),card.cap),msp=ms(card);return{sp,rw,prog:Math.min(sp/msp,1),rem:Math.max(msp-sp,0),rl:Math.max(card.cap-rw,0),r};}
function rank(amt,catId){const cat=S.cats.find(c=>c.id===catId);return S.cards.map(card=>{const ok=card.channels.some(ch=>cat?.channels?.includes(ch));if(!ok)return{card,tr:0,ob:0,score:-999,reason:'通路不符',dis:true};const{sp,rw}=cstat(card),ns=sp+amt,nr=Math.min(ns*(card.rate/100),card.cap),tr=nr-rw,ob=Math.max(ns-ms(card),0);return{card,tr,ob,score:tr-ob*.5,reason:ob>0?`超出上限 ${f$(ob)}`:`可獲回饋 ${f$(tr)}`,dis:false};}).sort((a,b)=>b.score-a.score);}
function exp(){const b=new Blob([JSON.stringify({v:6,at:new Date().toISOString(),cards:S.cards,recs:S.recs,cats:S.cats},null,2)],{type:'application/json'});const u=URL.createObjectURL(b);Object.assign(document.createElement('a'),{href:u,download:`card-tracker-${td()}.json`}).click();URL.revokeObjectURL(u);toast('匯出成功 ✓');}
document.getElementById('fimp').onchange=function(){const file=this.files?.[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.cards)throw 0;S.cards=d.cards;S.recs=d.recs||d.records||[];if(d.cats)S.cats=d.cats;save();toast(`匯入完成：${S.cards.length}張卡`);render();}catch(er){toast('匯入失敗','err');}};r.readAsText(file);this.value='';};

function vHistory(){const r=S.recs.filter(x=>x.date.startsWith(S.month));const[y,m]=S.month.split('-');let h=`<div class="sl">消費紀錄 · ${y} 年 ${parseInt(m)} 月</div>`;if(!r.length)return h+`<div class="empty">這個月還沒有消費紀錄</div>`;[...r].sort((a,b)=>b.date.localeCompare(a.date)).forEach((x,i)=>{const card=S.cards.find(c=>c.id===x.cardId),cat=S.cats.find(c=>c.id===x.catId);if(!card)return;h+=`<div class="ri up" style="border-left-color:${card.accent};animation-delay:${i*.04}s"><div class="rl"><div class="rm"><span style="font-size:16px">${cat?.emoji||'📦'}</span><span style="font-size:11px;color:${C.text3}">${cat?.name||'其他'}</span>${badge(card,true)}<span class="rd">${fd(x.date)}</span></div>${x.note?`<div style="font-size:12px;color:${C.text3};padding-left:2px">${x.note}</div>`:''}</div><div><div style="font-size:17px;font-weight:800;color:${C.text};text-align:right">${f$(x.amount)}</div><div style="font-size:12px;font-weight:600;color:${card.accent};text-align:right">+${f$(x.amount*(card.rate/100))}</div></div><button style="background:none;border:none;color:${C.text3};font-size:14px;padding:4px 6px;border-radius:6px" onclick="cdel(${x.id})">✕</button></div>`;});return h;}

s:10px;padding:8px 16px;color:white;font-size:12px;font-weight:700;box-shadow:0 2px 10px ${C.pink}44" onclick="openCat(null)">＋ 新增</button></div><div class="cat-mgrid">`;S.cats.forEach(c=>{h+=`<div class="camc"><div style="font-size:22px;margin-bottom:4px">${c.emoji}</div><div style="font-size:12px;font-weight:600;color:${C.text};margin-bottom:2px">${c.name}</div>${c.builtIn?`<div style="font-size:9px;color:${C.text3}">內建</div>`:`<button style="font-size:10px;color:${C.primary};background:none;border:none;font-weight:600" onclick="openCat('${c.id}')">編輯</button>`}</div>`;});h+=`</div><div class="sl">資料管理</div><div class="dcard"><div><div style="font-size:13px;font-weight:700;color:${C.text};margin-bottom:3px">自動存檔</div><div style="font-size:11px;color:${C.text3}">每次變更後自動儲存至本機</div></div><span id="si2" style="font-size:11px;color:${C.text3}"></span></div><button class="dbtn" style="border:1.5px solid ${C.accent};color:${C.accent};box-shadow:0 2px 8px ${C.accent}22" onclick="exp()"><span style="font-size:18px">⬇</span> 匯出備份（JSON）</button><button class="dbtn" style="border:1.5px solid ${C.primary};color:${C.primary}" onclick="document.getElementById('fimp').click()"><span style="font-size:18px">⬆</span> 匯入備份（JSON）</button><div style="font-size:11px;color:${C.text3};text-align:center;margin-bottom:16px;line-height:1.7;padding:0 16px">匯入時將覆蓋目前所有資料，請先匯出備份</div><button class="dbtn" style="border:1.5px solid rgba(244,63,94,.3);color:${C.danger};margin-bottom:0" onclick="clrRecs()">清除所有消費紀錄</button>`;return h;}
function render(){rh();document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.v===S.view));const el=document.getElementById('content');el.className='fade';if(S.view==='home')el.innerHTML=vHome();else if(S.view==='add')el.innerHTML=vAdd();else if(S.view==='history')el.innerHTML=vHistory();else el.innerHTML=vCards();setTimeout(()=>{const e=document.getElementById('si2');if(e){const t=localStorage.getItem(K.ls);e.textContent=t?`上次存檔 ${ft(new Date(t))}`:''}},0);}
function sv(v){S.view=v;render();}
function uf(k,v){
  S.form[k]=v;
  // 只有切換類別或卡片時才重繪（避免打字時鍵盤閃退）
  if(S.view==='add' && (k==='catId'||k==='cardId')){
    document.getElementById('content').innerHTML=vAdd();
  }
  // 金額變動時只更新智慧推薦區塊，不重繪整頁
  if(S.view==='add' && k==='amt'){
    const amt=+v;
    const rk=amt>0?rank(amt,S.form.catId):[];
    const best=rk.find(x=>!x.dis);
    let bannerEl=document.getElementById('smart-banner');
    if(!bannerEl){
      // 插入到表單最前面
      const wrap=document.getElementById('add-form-wrap');
      if(wrap){
        bannerEl=document.createElement('div');
        bannerEl.id='smart-banner';
        wrap.prepend(bannerEl);
      }
    }
    if(bannerEl){
      if(amt>0&&best){
        let oth='';
        if(rk.length>1){oth=`<div class="smo">`+rk.slice(1).map(x=>`<div style="display:flex;align-items:center;gap:8px;margin-top:6px">${badge(x.card,true)}<span style="font-size:11px;color:${x.dis?C.text3:x.ob>0?C.warn:C.text2}">${x.dis?'⊘ 通路不符':x.reason}</span></div>`).join('')+`</div>`;}

      } else {
        bannerEl.innerHTML='';

    const fa=document.getElementById('fa');
    if(fa)fa.style.boxShadow=amt>0?`0 0 0 3px ${C.primary}22`:'';
  }

document.querySelectorAll('.nb').forEach(b=>b.onclick=()=>sv(b.dataset.v));
function openCard(cardId){const ex=cardId?S.cards.find(c=>c.id===cardId):null,isNew=!ex;let f=ex?{...ex}:{name:'',bank:'',color:BPS[0],accent:APS[0],rate:'',cap:'',cycle:'monthly',resetDay:'1',channels:['all'],note:''};const ov=document.createElement('div');ov.className='ov ov-wrap';ov.onclick=e=>{if(e.target===ov)ov.remove();};function rs(){const rN=+f.rate,cN=+f.cap,pv=rN>0&&cN>0?f$(cN/(rN/100)):'—';const hnt=rN>0&&cN>0?`<div class="hb">✦ 刷超過 <b>${pv}</b> 就不划算</div>`:'';const cych=CYOPTS.map(c=>`<button class="chip${f.cycle===c.id?' on':''}" onclick="ce_cy('${c.id}')">${c.l}</button>`).join('');const chch=CHOPTS.map(c=>`<button class="chip${f.channels.includes(c.id)?' on':''}" onclick="ce_ch('${c.id}')">${c.l}</button>`).join('');const bgd=BPS.map(c=>`<button class="cdot${f.color===c?' sel':''}" style="background:${c}" onclick="ce_s('color','${c}')"></button>`).join('');const acd=APS.map(c=>`<button class="cdot${f.accent===c?' sel':''}" style="background:${c}" onclick="ce_s('accent','${c}')"></button>`).join('');ov.innerHTML=`<div class="sh"><div class="shd"><div class="shdb"></div></div><div class="shh"><span class="sht">${isNew?'✦ 新增信用卡':'✎ 編輯卡片'}</span><button class="shc" onclick="document.querySelector('.ov-wrap').remove()">✕</button></div><div style="margin:14px 16px 0;padding:16px 18px;border-radius:16px;background:${f.color};border:1.5px solid ${f.accent}55;box-shadow:0 4px 20px ${f.accent}33;flex-shrink:0"><div style="font-size:16px;font-weight:800;color:${f.accent}">${f.name||'卡片名稱'}</div><div style="font-size:12px;color:${f.accent}99;margin-top:2px">${f.bank||'銀行名稱'}</div><div style="display:flex;gap:18px;margin-top:10px"><span style="font-size:13px;color:${f.accent}">${f.rate?f.rate+'%':'— %'}</span><span style="font-size:11px;color:${f.accent}88">上限 ${cN>0?f$(cN):'—'}</span><span style="font-size:11px;color:${f.accent}66">建議刷 ${pv}</span></div></div><div class="shb"><div class="sl">基本資訊</div><div style="margin-bottom:10px"><label class="fl" style="font-size:11px">卡片名稱 *</label><input class="sinp" id="cen" placeholder="例：永豐大戶卡" value="${f.name}" oninput="ce_s('name',this.value)"><div class="ferr" id="cen-e"></div></div><div style="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label class="fl" style="font-size:11px">銀行名稱</label><input class="sinp" placeholder="永豐銀行" value="${f.bank}" oninput="ce_s('bank',this.value)"></div><div style="flex:1"><label class="fl" style="font-size:11px">備註</label><input class="sinp" placeholder="特殊說明（可略）" value="${f.note}" oninput="ce_s('note',this.value)"></div></div><div class="sl mt">回饋設定</div><div style="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label class="fl" style="font-size:11px">回饋率 % *</label><div style="position:relative"><input class="sinp" type="number" step="0.1" min="0" max="100" placeholder="2.5" value="${f.rate}" style="padding-right:28px" oninput="ce_s('rate',this.value)"><span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:${C.text3};font-size:13px">%</span></div><div class="ferr" id="cer-e"></div></div><div style="flex:1"><label class="fl" style="font-size:11px">回饋上限 TWD *</label><div style="position:relative"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:${C.text3};font-size:13px">$</span><input class="sinp" type="number" min="0" placeholder="400" value="${f.cap}" style="padding-left:22px" oninput="ce_s('cap',this.value)"></div><div class="ferr" id="cec-e"></div></div></div>${hnt}<div class="sl mt">回饋週期</div><div class="cr" style="margin-bottom:12px">${cych}</div><div style="margin-bottom:10px"><label class="fl" style="font-size:11px">重置日（每月幾號）</label><div style="display:flex;align-items:center;gap:10px"><input class="sinp" type="number" min="1" max="28" placeholder="1" value="${f.resetDay}" style="width:72px" oninput="ce_s('resetDay',this.value)"><span style="font-size:12px;color:${C.text3}">號（建議填帳單結帳日）</span></div><div class="ferr" id="cerd-e"></div></div><div class="sl mt">適用通路</div><div class="cr" style="margin-bottom:16px">${chch}</div><div class="sl mt">卡片顏色</div><div style="display:flex;gap:16px"><div style="flex:1"><div style="font-size:10px;color:${C.text3};margin-bottom:6px">背景色</div><div style="display:flex;flex-wrap:wrap;gap:5px">${bgd}<input type="color" value="${f.color}" onchange="ce_s('color',this.value)"></div></div><div style="flex:1"><div style="font-size:10px;color:${C.text3};margin-bottom:6px">強調色</div><div style="display:flex;flex-wrap:wrap;gap:5px">${acd}<input type="color" value="${f.accent}" onchange="ce_s('accent',this.value)"></div></div></div><div style="height:16px"></div></div><div class="shf">${!isNew?`<button class="delbtn" onclick="delCard('${ex.id}')">刪除</button>`:''}<button class="cancbtn" onclick="document.querySelector('.ov-wrap').remove()">取消</button><button class="savbtn" onclick="subCard()">儲存</button></div></div>`;ov.querySelector('.sh').onclick=e=>e.stopPropagation();}
window.ce_s=(k,v)=>{
  f[k]=v;
  // 只有影響預覽外觀的欄位才重繪（顏色、回饋率、上限）
  if(k==='color'||k==='accent'||k==='rate'||k==='cap'){rs();}
  // 名字/銀行/備註只更新預覽文字，不重繪
  if(k==='name'){const el=ov.querySelector('[data-preview="name"]');if(el)el.textContent=v||'卡片名稱';}
  if(k==='bank'){const el=ov.querySelector('[data-preview="bank"]');if(el)el.textContent=v||'銀行名稱';}
};window.ce_cy=v=>{f.cycle=v;rs();};window.ce_ch=ch=>{if(ch==='all'){f.channels=['all'];rs();return;}const cur=f.channels.filter(c=>c!=='all'),next=cur.includes(ch)?cur.filter(c=>c!==ch):[...cur,ch];f.channels=next.length===0?['all']:next;rs();};
window.subCard=()=>{const e={};if(!f.name.trim())e.n='請輸入卡片名稱';if(!f.rate||isNaN(+f.rate)||+f.rate<=0||+f.rate>100)e.r='回饋率需介於 0–100%';if(!f.cap||isNaN(+f.cap)||+f.cap<=0)e.c='請輸入正確上限';if(!f.resetDay||+f.resetDay<1||+f.resetDay>28)e.d='需在 1–28 之間';if(Object.keys(e).length){const ne=document.getElementById('cen-e'),re=document.getElementById('cer-e'),ce=document.getElementById('cec-e'),de=document.getElementById('cerd-e');if(ne)ne.textContent=e.n||'';if(re)re.textContent=e.r||'';if(ce)ce.textContent=e.c||'';if(de)de.textContent=e.d||'';return;}const chs=f.channels.length?f.channels:['all'];const cl=chs.includes('all')?'所有通路':chs.map(ch=>CHOPTS.find(o=>o.id===ch)?.l||ch).join('、');const saved={...f,id:f.id||uid(),rate:+f.rate,cap:+f.cap,resetDay:+f.resetDay,channels:chs,channelLabel:cl};delete saved._t;const idx=S.cards.findIndex(c=>c.id===saved.id);if(idx>=0)S.cards[idx]=saved;else S.cards.push(saved);if(!S.form.cardId&&S.cards.length)S.form.cardId=S.cards[0].id;ov.remove();save();toast('卡片已儲存 ✓');render();};
window.delCard=id=>{S.cards=S.cards.filter(c=>c.id!==id);S.recs=S.recs.filter(r=>r.cardId!==id);ov.remove();save();toast('卡片已刪除','warn');render();};
document.body.appendChild(ov);rs();}
function openCat(catId){const ex=catId?S.cats.find(c=>c.id===catId):null,isNew=!ex;let f=ex?{...ex}:{emoji:'📦',name:'',channels:['all']};let showEm=false;const ov=document.createElement('div');ov.className='ov ov-wrap';ov.onclick=e=>{if(e.target===ov)ov.remove();};function rs(){const cch=CHOPTS.map(c=>`<button class="chip${f.channels.includes(c.id)?' on':''}" onclick="cat_ch('${c.id}')">${c.l}</button>`).join('');const ep=showEm?`<div class="emp">`+EMOJIS.map(e=>`<button class="emo${f.emoji===e?' sel':''}" onclick="cat_em('${e}')">${e}</button>`).join('')+`</div>`:'';ov.innerHTML=`<div class="sh" style="max-height:75vh"><div class="shd"><div class="shdb"></div></div><div style="padding:8px 20px 28px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><span class="sht">${isNew?'＋ 新增類別':'✎ 編輯類別'}</span><button class="shc" onclick="document.querySelector('.ov-wrap').remove()">✕</button></div><div style="display:flex;gap:10px;margin-bottom:14px"><div style="position:relative"><button class="emb" onclick="cat_tem()">${f.emoji}</button>${ep}</div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><label class="fl" style="font-size:11px">類別名稱 *</label><input class="sinp${f._e?' err':''}" placeholder="例：百貨公司" value="${f.name}" oninput="f.name=this.value;f._e=\'\';">${f._e?`<div class="ferr">${f._e}</div>`:''}</div></div><div style="background:#e8eeff;border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px"><span style="font-size:20px">${f.emoji}</span><span style="font-size:14px;font-weight:700;color:${C.text}">${f.name||'類別名稱'}</span><span style="font-size:11px;color:${C.text3};margin-left:auto">預覽</span></div><label class="fl" style="font-size:11px;display:block;margin-bottom:8px">適用通路</label><div class="cr" style="margin-bottom:20px">${cch}</div><div style="display:flex;gap:10px">${!isNew&&!ex?.builtIn?`<button class="delbtn" onclick="delCat('${ex.id}')">刪除</button>`:''}<button class="cancbtn" onclick="document.querySelector('.ov-wrap').remove()">取消</button><button class="savbtn" onclick="subCat()">儲存</button></div></div></div>`;ov.querySelector('.sh').onclick=e=>e.stopPropagation();}
window.cat_tem=()=>{showEm=!showEm;rs();};window.cat_em=e=>{f.emoji=e;showEm=false;rs();};window.cat_n=v=>{f.name=v;f._e='';rs();};window.cat_ch=ch=>{if(ch==='all'){f.channels=['all'];rs();return;}const cur=f.channels.filter(c=>c!=='all'),next=cur.includes(ch)?cur.filter(c=>c!==ch):[...cur,ch];f.channels=next.length===0?['all']:next;rs();};
window.subCat=()=>{if(!f.name.trim()){f._e='請輸入類別名稱';rs();return;}const saved={id:f.id||uid(),emoji:f.emoji,name:f.name.trim(),channels:f.channels,builtIn:false};const idx=S.cats.findIndex(c=>c.id===saved.id);if(idx>=0)S.cats[idx]=saved;else S.cats.push(saved);ov.remove();save();toast('類別已儲存 ✓');render();};
window.delCat=id=>{S.cats=S.cats.filter(c=>c.id!==id);ov.remove();save();toast('類別已刪除','warn');render();};
document.body.appendChild(ov);rs();}
render();save();
</script>
</body>
</html>
