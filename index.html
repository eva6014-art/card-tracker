<script>

var C={p:’#7c6cfc’,a:’#38b6ff’,pk:’#f472b6’,t:’#1e1b4b’,t2:’#4b5080’,t3:’#8b93c8’,d:’#f43f5e’,w:’#f59e0b’,ok:’#10b981’,bg:’#f0f4ff’,b:’#d0d8ff’};
var TC=[’#38b6ff’,’#f59e0b’,’#10b981’,’#f472b6’,’#7c6cfc’];
var CSETS=[{c:’#1e3a5f’,a:’#38b6ff’},{c:’#2d1b69’,a:’#7c6cfc’},{c:’#5b0e2d’,a:’#f472b6’},{c:’#064e3b’,a:’#34d399’},{c:’#1e1b4b’,a:’#fbbf24’},{c:’#0c4a6e’,a:’#60a5fa’}];

var DEFCHOPTS=[
{id:‘all’,l:‘所有通路’},{id:‘online’,l:‘網購’},{id:‘linepay’,l:‘LINE Pay’},
{id:‘jkopay’,l:‘街口支付’},{id:‘supermarket’,l:‘超市/量販’},{id:‘dining’,l:‘餐飲’},{id:‘sport’,l:‘運動相關’}
];
var CYOPTS=[{id:‘monthly’,l:‘每月’},{id:‘quarterly’,l:‘每季’},{id:‘yearly’,l:‘每年’}];
var DEFCATS=[
{id:‘dining’,e:‘🍜’,n:‘餐飲’,ch:[‘all’,‘dining’],bi:true},
{id:‘online’,e:‘💻’,n:‘網購’,ch:[‘all’,‘online’],bi:true},
{id:‘transport’,e:‘🚇’,n:‘交通’,ch:[‘all’],bi:true},
{id:‘grocery’,e:‘🛒’,n:‘超市’,ch:[‘all’,‘supermarket’],bi:true},
{id:‘linepay’,e:‘📱’,n:‘LINE Pay’,ch:[‘all’,‘linepay’],bi:true},
{id:‘jkopay’,e:‘🏪’,n:‘街口’,ch:[‘all’,‘jkopay’],bi:true},
{id:‘sport’,e:‘🏋️’,n:‘運動’,ch:[‘all’,‘sport’],bi:true},
{id:‘other’,e:‘📦’,n:‘其他’,ch:[‘all’],bi:true}
];
var DEFCARDS=[
{id:‘fen’,n:‘永豐大戶卡’,bk:‘永豐銀行’,c:’#1e3a5f’,a:’#38b6ff’,cy:‘monthly’,rd:1,ch:[‘all’],cl:‘所有通路’,note:’’,customCh:[],
tiers:[{id:‘t1’,n:‘基本回饋’,r:1,cap:0,ms:0,ch:[‘all’]},{id:‘t2’,n:‘大戶加碼’,r:2.5,cap:400,ms:0,ch:[‘all’]}]},
{id:‘lp’,n:‘LINE Pay 卡’,bk:‘中國信託’,c:’#2d1b69’,a:’#7c6cfc’,cy:‘monthly’,rd:1,ch:[‘linepay’],cl:‘LINE Pay’,note:’’,customCh:[],
tiers:[{id:‘t1’,n:‘基本回饋’,r:3,cap:500,ms:0,ch:[‘all’]}]},
{id:‘jko’,n:‘街口聯名卡’,bk:‘第一銀行’,c:’#5b0e2d’,a:’#f472b6’,cy:‘monthly’,rd:1,ch:[‘jkopay’],cl:‘街口支付’,note:’’,customCh:[],
tiers:[{id:‘t1’,n:‘基本回饋’,r:2,cap:300,ms:0,ch:[‘all’]}]}
];

var K={ca:‘ctv9ca’,re:‘ctv9re’,ct:‘ctv9ct’,ls:‘ctv9ls’};
function lg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function nm(){var d=new Date();return d.getFullYear()+’-’+String(d.getMonth()+1).padStart(2,‘0’);}
function td(){return new Date().toISOString().slice(0,10);}
function uid(){return Math.random().toString(36).slice(2,8);}
function M(n){return ‘$’+Math.round(n).toLocaleString(‘zh-TW’);}
function fdate(d){var x=new Date(d);return(x.getMonth()+1)+’/’+x.getDate();}
function ftime(d){if(!d)return’’;var x=new Date(d);return String(x.getHours()).padStart(2,‘0’)+’:’+String(x.getMinutes()).padStart(2,‘0’);}
function esc(s){if(!s)return’’;return(s+’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);}
function capN(v){var n=parseFloat(v);return(isFinite(n)&&n>0)?n:0;}

function getSmp(){var m=nm();return[
{id:1,cid:‘fen’,amt:3200,cat:‘online’,note:‘momo購物’,dt:m+’-05’},
{id:2,cid:‘fen’,amt:5500,cat:‘dining’,note:‘家族聚餐’,dt:m+’-10’},
{id:3,cid:‘lp’,amt:420,cat:‘linepay’,note:‘LINE Pay早午餐’,dt:m+’-12’},
{id:4,cid:‘jko’,amt:1280,cat:‘grocery’,note:‘好市多’,dt:m+’-14’}
];}

var S={
cards:lg(K.ca,DEFCARDS),recs:lg(K.re,getSmp()),cats:lg(K.ct,DEFCATS),
view:‘home’,month:nm(),form:{cid:’’,amt:’’,cat:‘dining’,note:’’,dt:td()}
};
// Repair cats: remove corrupted entries (e.g. “+ em +” from old bug)
S.cats=S.cats.filter(function(c){
return c&&c.id&&c.n&&c.e&&Array.isArray(c.ch)&&
typeof c.e===‘string’&&c.e.length<=8&&  // emoji is short
c.n.length<=50&&                          // name is short
c.id.indexOf(’ ’)<0;                      // id has no spaces
});
if(!S.cats.length)S.cats=JSON.parse(JSON.stringify(DEFCATS));
// Repair cards: fix tiers structure
S.cards.forEach(function(card){
try{fix(card);}catch(e){card.tiers=[{id:‘t1’,n:‘回饋’,r:1,cap:0,ms:0,ch:[‘all’]}];}
});
if(S.cards.length&&!S.form.cid)S.form.cid=S.cards[0].id;

function fix(card){
if(!card.tiers||!card.tiers.length)card.tiers=[{id:‘t1’,n:’\u57fa\u672c\u56de\u994b’,r:card.rate||1,cap:card.cap||0,ms:0,ch:[‘all’]}];
card.tiers.forEach(function(t){if(!t.ch||!t.ch.length)t.ch=[‘all’];if(!t.id)t.id=uid();});
if(!card.ch||!card.ch.length)card.ch=[‘all’];
if(!card.customCh)card.customCh=[];
}
function getCh(card){
var all=DEFCHOPTS.slice();
((card&&card.customCh)||[]).forEach(function(c){if(c&&c.id&&c.l&&!all.find(function(x){return x.id===c.id;}))all.push(c);});
return all;
}
function calcT(tier,spent,catId,card){
var cat=S.cats.find(function(c){return c.id===catId;});
var tch=tier.ch&&tier.ch.length?tier.ch:[‘all’];
var ok=catId===‘all_overview’||chMatch(tier,catId,card||null);
if(!ok)return{rw:0,prog:0,ok:false,active:false,uncapped:false};
var raw=spent*(tier.r/100),rw=tier.cap>0?Math.min(raw,tier.cap):raw;
var ms=tier.ms||0,uncapped=tier.cap<=0;
if(ms>0){var p=Math.min(spent/ms,1);return{rw:rw,prog:p,rem:Math.max(ms-spent,0),ok:true,active:spent>=ms,uncapped:uncapped};}
var mx=tier.cap>0?tier.cap/(tier.r/100):0,p2=mx>0?Math.min(spent/mx,1):(spent>0?0.3:0);
return{rw:rw,prog:p2,rem:mx>0?Math.max(mx-spent,0):0,ok:true,active:true,uncapped:uncapped};
}
function getCardPeriod(card, ym){
// ym = the “display month” the user is viewing (e.g. ‘2026-04’)
// We find the billing cycle that is ACTIVE during ym
var rd = +card.rd || 1;
var p = ym.split(’-’).map(Number);
var yr = p[0], mo = p[1];

if(rd <= 1 || rd >= 29){
// Reset on 1st or last day: cycle = calendar month
var first = yr+’-’+String(mo).padStart(2,‘0’)+’-01’;
var lastD = new Date(yr, mo, 0).getDate();
var lastStr = yr+’-’+String(mo).padStart(2,‘0’)+’-’+String(lastD).padStart(2,‘0’);
return {start: first, end: lastStr};
}

// rd=2..28
// The cycle that starts in ym: ym/rd ~ (ym+1)/(rd-1)
// The cycle that starts in ym-1: (ym-1)/rd ~ ym/(rd-1)
//
// Which cycle is “active” for display month ym?
// We use today’s date to decide if we’re past the reset day this month
var today = new Date();
var todayYm = today.getFullYear()+’-’+String(today.getMonth()+1).padStart(2,‘0’);
var isCurrentMonth = (ym === todayYm);

var cycleStartMo, cycleStartYr;
if(isCurrentMonth){
// If today >= rd, current cycle started this month
if(today.getDate() >= rd){
cycleStartYr = yr; cycleStartMo = mo;
} else {
// today < rd, current cycle started last month
cycleStartYr = yr; cycleStartMo = mo - 1;
if(cycleStartMo < 1){ cycleStartMo = 12; cycleStartYr–; }
}
} else {
// For historical months: show the cycle that STARTS in ym
// e.g. viewing Mar with rd=14 → show Mar 14 ~ Apr 13
cycleStartYr = yr; cycleStartMo = mo;
}

// Cycle start: cycleStartYr/cycleStartMo/rd
var daysInStart = new Date(cycleStartYr, cycleStartMo, 0).getDate();
var sDay = Math.min(rd, daysInStart);
var sStr = cycleStartYr+’-’+String(cycleStartMo).padStart(2,‘0’)+’-’+String(sDay).padStart(2,‘0’);

// Cycle end: next month after cycleStart, day rd-1
var eYr = cycleStartYr, eMo = cycleStartMo + 1;
if(eMo > 12){ eMo = 1; eYr++; }
var daysInEnd = new Date(eYr, eMo, 0).getDate();
var eDay = Math.min(rd - 1, daysInEnd);
var eStr = eYr+’-’+String(eMo).padStart(2,‘0’)+’-’+String(eDay).padStart(2,‘0’);

return {start: sStr, end: eStr};
}
function inPeriod(dt, period){
return dt >= period.start && dt <= period.end;
}
function cstat(card){
fix(card);
var period=getCardPeriod(card, S.month);
var r=S.recs.filter(function(x){return x.cid===card.id&&inPeriod(x.dt,period);});
var sp=r.reduce(function(s,x){return s+x.amt;},0),rw=0;
var ts=card.tiers.map(function(t){var x=calcT(t,sp,‘all_overview’,card);rw+=x.rw;return x;});
return{sp:sp,rw:rw,ts:ts,r:r};
}
function chMatch(tier,catId,card){
// Does consuming in catId category count toward this tier?
var tch=tier.ch&&tier.ch.length?tier.ch:[‘all’];
// Rule 1: tier allows all channels
if(tch.indexOf(‘all’)>=0)return true;
var cat=S.cats.find(function(c){return c.id===catId;});
if(!cat)return false;
// Rule 2: standard ID intersection (e.g. tier=[‘dining’], cat.ch=[‘all’,‘dining’])
var stdMatch=tch.some(function(ch){
if(ch.indexOf(‘cus_’)===0)return false; // skip custom IDs for now
return cat.ch.indexOf(ch)>=0;
});
if(stdMatch)return true;
// Rule 3: custom tier channel - match by label name vs category name
var allCh=card?getCh(card):DEFCHOPTS;
var cusMatch=tch.some(function(ch){
if(ch.indexOf(‘cus_’)!==0)return false;
var opt=allCh.find(function(o){return o.id===ch;});
if(!opt)return false;
// Case-insensitive name match
var cn=cat.n.toLowerCase().replace(/\s+/g,’’);
var ol=opt.l.toLowerCase().replace(/\s+/g,’’);
return cn===ol||cn.indexOf(ol)>=0||ol.indexOf(cn)>=0;
});
return cusMatch;
}
function tierSpent(card,tier,catId){
var period=getCardPeriod(card, S.month);
return S.recs.filter(function(x){
if(x.cid!==card.id||!inPeriod(x.dt,period))return false;
return chMatch(tier,x.cat,card);
}).reduce(function(s,x){return s+x.amt;},0);
}
function rank(amt,catId){
return S.cards.map(function(card){
fix(card);
// For each tier: calculate incremental reward using only matching-channel spend
var tr=card.tiers.reduce(function(sum,tier){
var spTier=tierSpent(card,tier,catId);
// Does this new purchase match this tier’s channels?
if(!chMatch(tier,catId,card))return sum;
// Check milestone: must hit ms to earn anything
var ms=tier.ms||0;
if(ms>0&&spTier+amt<ms)return sum; // Won’t hit milestone
// Calculate reward before and after this purchase
var rwBefore=tier.cap>0?Math.min(spTier*(tier.r/100),tier.cap):spTier*(tier.r/100);
var rwAfter=tier.cap>0?Math.min((spTier+amt)*(tier.r/100),tier.cap):(spTier+amt)*(tier.r/100);
return sum+Math.max(rwAfter-rwBefore,0);
},0);
return{card:card,tr:tr};
}).sort(function(a,b){return b.tr-a.tr;});
}
var svt,svs=‘idle’;
function save(){
svs=‘saving’;rsi();clearTimeout(svt);
svt=setTimeout(function(){
lset(K.ca,S.cards);lset(K.re,S.recs);lset(K.ct,S.cats);
localStorage.setItem(K.ls,new Date().toISOString());
svs=‘saved’;rsi();setTimeout(function(){svs=‘idle’;rsi();},2000);
},800);
}

function rsi(){var el=document.getElementById(‘sind’);if(!el)return;if(svs===‘saving’)el.innerHTML=’<span style="font-size:10px;color:rgba(255,255,255,.7)">儲存中…</span>’;else if(svs===‘saved’)el.innerHTML=’<span style="font-size:10px;color:#84ffda">✓ 已存檔</span>’;else{var t=localStorage.getItem(K.ls);el.innerHTML=t?’<span style="font-size:10px;color:rgba(255,255,255,.6)">’+ftime(new Date(t))+’ 存檔</span>’:’’;}}

var _tt;
function toast(m,tp){
var el=document.getElementById(‘toast’);
el.textContent=m;el.style.background=tp===‘err’?C.d:tp===‘warn’?C.w:C.ok;
el.style.display=‘block’;clearTimeout(_tt);_tt=setTimeout(function(){el.style.display=‘none’;},2500);
}
function ring(prog,sz,col){
prog=isNaN(prog)?0:Math.max(0,Math.min(prog,1));
var s=5,r=(sz-s)/2,ci=2*Math.PI*r,co=prog>=1?C.d:prog>.8?C.w:col,off=ci*(1-prog);

function dispatchAct(btn){
var act=btn.dataset.act,id=btn.dataset.id||’’,v=btn.dataset.v||’’;
if(act===‘sv’)sv(v);
else if(act===‘setCat’)setCat(id);
else if(act===‘setC’)setC(id);
else if(act===‘applyC’)applyC(id);
else if(act===‘addR’)addR();
else if(act===‘delR’)delR(id);
else if(act===‘editR’)editR(+id);
else if(act===‘openCard’)openCard(id||null);
else if(act===‘openCat’)openCat(id||null);
else if(act===‘expData’)expData();
else if(act===‘impData’)document.getElementById(‘fimp’).click();
else if(act===‘clr’)clr();
else if(act===‘ceAddCh’)window._ceAddCh&&window._ceAddCh();
else if(act===‘ceConfCh’)window._ceConfCh&&window._ceConfCh();
else if(act===‘ceDelCh’)window._ceDelCh&&window._ceDelCh(id);
else if(act===‘ceSave’)window._ceSave&&window._ceSave();
else if(act===‘ceDel’)window._ceDel&&window._ceDel(id);
else if(act===‘ceCy’)window._ceCy&&window._ceCy(id);
else if(act===‘ceCh’)window._ceCh&&window._ceCh(id);
else if(act===‘teCh’){var ti2=+(btn.dataset.ti||0);window._teCh&&window._teCh(ti2,id);}
else if(act===‘teDel’){var ti2=+(btn.dataset.ti||0);window._teDel&&window._teDel(ti2);}
else if(act===‘teAdd’)window._teAdd&&window._teAdd();
else if(act===‘catTogEm’)window._catTogEm&&window._catTogEm();
else if(act===‘catEm’)window._catEm&&window._catEm(+id);
else if(act===‘catCh’)window._catCh&&window._catCh(id);
else if(act===‘catSave’)window._catSave&&window._catSave();
else if(act===‘catDel’)window._catDel&&window._catDel(id);
else if(act===‘delCat’){
if(confirm(‘確定刪除「’+((S.cats.find(function(c){return c.id===id;})||{}).n||’’)+’ 」類別？’)){
S.cats=S.cats.filter(function(c){return c.id!==id;});
if(S.form.cat===id)S.form.cat=‘dining’;
save();render();
}
}
else if(act===‘ovClose’){var ov=document.querySelector(’.ov-w’);if(ov)ov.remove();}
}
document.addEventListener(‘click’,function(e){
var btn=e.target;

if(!btn||!btn.dataset||!btn.dataset.act)return;

var a=document.getElementById(‘tn’+ti);if(a)a.addEventListener(‘input’,function(){f.tiers[ti].n=this.value;upPT();});
var b=document.getElementById(‘tr’+ti);if(b)b.addEventListener(‘input’,function(){f.tiers[ti].r=this.value;upPT();updH(ti);});
var cv=document.getElementById(‘tcp’+ti);if(cv)cv.addEventListener(‘input’,function(){f.tiers[ti].cap=this.value;upPT();updH(ti);});
var d=document.getElementById(‘tm’+ti);if(d)d.addEventListener(‘input’,function(){f.tiers[ti].ms=this.value;});
});
bindBtns();
}
window._teCh=function(ti,ch){
var t=f.tiers[ti];if(!t)return;
if(ch===‘all’){t.ch=[‘all’];}
else{var cur=t.ch.filter(function(c){return c!==‘all’;});var i=cur.indexOf(ch);if(i>=0)cur.splice(i,1);else cur.push(ch);t.ch=cur.length?cur:[‘all’];}
syncT();
// Only update this tier’s channel chips, not the whole modal
var chOpts2=gCh();
var container=document.querySelector(’#tw .tc:nth-child(’+(ti+1)+’) .cr’);
if(container){
container.innerHTML=chOpts2.map(function(c2){return ‘<button class="chip'+(t.ch.indexOf(c2.id)>=0?' on':'')+'" style="padding:4px 8px;font-size:11px" data-act="teCh" data-ti="'+ti+'" data-id="'+c2.id+'">’+c2.l+’</button>’;}).join(’’);
bindBtns();
}else{bld();bindBtns();}
};
window._teDel=function(ti){syncT();f.tiers.splice(ti,1);rebuildTw();};
window._teAdd=function(){syncT();f.tiers.push({id:‘t’+uid(),n:‘加碼回饋’,r:’’,cap:’’,ms:’’,ch:[‘all’]});rebuildTw();};
window._ceSave=function(){
var cenEl=document.getElementById(‘cen’);if(cenEl)f.n=cenEl.value;
var cbnkEl=document.getElementById(‘cbnk’);if(cbnkEl)f.bk=cbnkEl.value;
var cnoteEl=document.getElementById(‘cnote’);if(cnoteEl)f.note=cnoteEl.value;
var crdEl=document.getElementById(‘crday’);if(crdEl)f.rd=crdEl.value;
syncT();
var ne=document.getElementById(‘cen-e’);
if(!f.n||!f.n.trim()){if(ne)ne.textContent=‘請輸入卡片名稱’;return;}
if(ne)ne.textContent=’’;
if(!f.tiers.some(function(t){return+t.r>0;})){toast(‘至少一檔需設回饋率’,‘err’);return;}
var chs=f.ch.length?f.ch:[‘all’];
var chOpts=gCh();
var cl=chs.indexOf(‘all’)>=0?‘所有通路’:chs.map(function(ch){var o=chOpts.find(function(x){return x.id===ch;});return o?o.l:ch;}).join(’、’);
var tiers=f.tiers.map(function(t){return{id:t.id||uid(),n:t.n||‘回饋’,r:+t.r||0,cap:capN(t.cap),ms:+t.ms||0,ch:t.ch&&t.ch.length?t.ch:[‘all’]};}).filter(function(t){return t.r>0;});
var saved={id:f.id||uid(),n:f.n.trim(),bk:f.bk||’’,c:f.c,a:f.a,cy:f.cy,rd:+f.rd||1,ch:chs,cl:cl,note:f.note||’’,customCh:f.customCh||[],tiers:tiers};
var i=S.cards.findIndex(function(c){return c.id===saved.id;});
if(i>=0)S.cards[i]=saved;else S.cards.push(saved);
if(!S.form.cid&&S.cards.length)S.form.cid=S.cards[0].id;
ov.remove();save();toast(‘卡片已儲存 ✓’);render();
};
window._ceDel=function(id){
if(!confirm(‘確定刪除此卡片？’))return;
S.cards=S.cards.filter(function(c){return c.id!==id;});
S.recs=S.recs.filter(function(r){return r.cid!==id;});
ov.remove();save();toast(‘卡片已刪除’,‘warn’);render();
};
document.body.appendChild(ov);bld();bindBtns();
}

function openCat(catId){
var ex=catId?S.cats.find(function(c){return c.id===catId;}):null,isNew=!ex;
var f=ex?JSON.parse(JSON.stringify(ex)):{id:’’,e:‘📦’,n:’’,ch:[‘all’],bi:false};
var showEm=false;

var EM=[‘🍜’, ‘🍣’, ‘☕’, ‘🛍’, ‘🚗’, ‘⛽’, ‘🚇’, ‘🛒’, ‘🏬’, ‘🏋️’, ‘🎬’, ‘📱’, ‘💻’, ‘🏥’, ‘✈️’, ‘🐾’, ‘🎁’, ‘🍺’, ‘💊’, ‘🔧’, ‘🍕’, ‘🥗’, ‘🧋’, ‘🚚’, ‘🏪’, ‘💳’, ‘🎮’, ‘📚’, ‘🌿’, ‘💰’, ‘📦’];

var ov=document.createElement(‘div’);ov.className=‘ov ov-w’;ov.onclick=function(e){if(e.target===ov)ov.remove();};
function bld(){
var ep=showEm?’<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;background:white;border:1px solid #d0d8ff;border-radius:10px;padding:8px">’+EM.map(function(em,ei){return ‘<button data-act="catEm" data-id="'+ei+'" style="font-size:20px;background:'+(f.e===em?'#e8eeff':'none')+';border:none;border-radius:6px;padding:2px;cursor:pointer;width:34px;height:34px">’+em+’</button>’;}).join(’’)+’</div>’:’’;
var chch=DEFCHOPTS.map(function(c){return ‘<button class="chip'+(f.ch.indexOf(c.id)>=0?' on':'')+'" data-act="catCh" data-id="'+c.id+'" style="padding:5px 10px;font-size:11px">’+c.l+’</button>’;}).join(’’);
var inner=’<div class="sh" style="max-height:75vh">’;
inner+=’<div style="width:32px;height:4px;border-radius:2px;background:#d0d8ff;margin:12px auto 4px"></div>’;
inner+=’<div class="shh"><span class="sht">’+(isNew?‘＋ 新增類別’:‘✎ 編輯類別’)+’</span><button class="shc" data-act="ovClose">✕</button></div>’;
inner+=’<div class="shb">’;
inner+=’<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">’;
inner+=’<div><button data-act="catTogEm" style="width:52px;height:52px;font-size:26px;border:1.5px solid #d0d8ff;border-radius:10px;background:white;cursor:pointer">’+f.e+’</button>’+ep+’</div>’;
inner+=’<div style="flex:1"><span class="tlbl" style="font-size:11px">類別名稱 *</span><input class="si" id="cat-n" value="'+esc(f.n)+'" placeholder="如：外送、加油"><div id="cat-ne" style="font-size:11px;color:#f43f5e;margin-top:2px"></div></div></div>’;
inner+=’<div style="background:#e8eeff;border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><span style="font-size:20px">’+f.e+’</span><span id="cat-prev" style="font-size:13px;font-weight:700;color:#1e1b4b">’+(f.n||‘類別名稱’)+’</span><span style="font-size:10px;color:#8b93c8;margin-left:auto">預覽</span></div>’;
inner+=’<span class="tlbl" style="font-size:11px;display:block;margin-bottom:6px">對應通路（決定哪些卡片加碼可計入此類別）</span>’;
inner+=’<div class="cr" style="gap:5px;margin-bottom:16px">’+chch+’</div><div style="height:8px"></div></div>’;
inner+=’<div class="shf">’;
if(!isNew&&!ex.bi)inner+=’<button class="delbtn" data-act="catDel" data-id="'+ex.id+'">刪除</button>’;
inner+=’<button class="cancbtn" data-act="ovClose">取消</button><button class="savbtn" data-act="catSave">儲存</button></div></div>’;
ov.innerHTML=inner;ov.querySelector(’.sh’).onclick=function(e){e.stopPropagation();};
var ni=document.getElementById(‘cat-n’);
if(ni)ni.addEventListener(‘input’,function(){f.n=this.value;var p=document.getElementById(‘cat-prev’);if(p)p.textContent=this.value||‘類別名稱’;});
}
window._catTogEm=function(){showEm=!showEm;bld();bindBtns();};
window._catEm=function(ei){f.e=EM[ei]||EM[0];showEm=false;bld();bindBtns();};
window._catCh=function(ch){
if(ch===‘all’){f.ch=[‘all’];}
else{var cur=f.ch.filter(function(x){return x!==‘all’;});var i=cur.indexOf(ch);if(i>=0)cur.splice(i,1);else cur.push(ch);f.ch=cur.length?cur:[‘all’];}
bld();bindBtns();
};
window._catSave=function(){
var ni=document.getElementById(‘cat-n’);if(ni)f.n=ni.value;
var ne=document.getElementById(‘cat-ne’);
if(!f.n||!f.n.trim()){if(ne)ne.textContent=‘請輸入類別名稱’;return;}
var saved={id:f.id||uid(),e:f.e,n:f.n.trim(),ch:f.ch,bi:false};
var i=S.cats.findIndex(function(c){return c.id===saved.id;});
if(i>=0)S.cats[i]=saved;else S.cats.push(saved);
ov.remove();save();toast(‘類別已儲存 ✓’);render();
};
window._catDel=function(id){
S.cats=S.cats.filter(function(c){return c.id!==id;});
ov.remove();save();toast(‘類別已刪除’,‘warn’);render();
};
document.body.appendChild(ov);bld();bindBtns();
}
function editR(id){
var rec=S.recs.find(function(x){return x.id===id;});
if(!rec)return;
var f=JSON.parse(JSON.stringify(rec));
var ov=document.createElement(‘div’);ov.className=‘ov ov-w’;ov.onclick=function(e){if(e.target===ov)ov.remove();};
function bldE(){
var catOpts=S.cats.map(function(cat){return ‘<option value=”’+cat.id+’”’+(f.cat===cat.id?’ selected’:’’)+’>’+cat.e+’ ‘+cat.n+’</option>’;}).join(’’);
var cardOpts=S.cards.map(function(card){return ‘<option value=”’+card.id+’”’+(f.cid===card.id?’ selected’:’’)+’>’+card.n+’</option>’;}).join(’’);
var inner=’<div class="sh" style="max-height:70vh">’;
inner+=’<div style="width:32px;height:4px;border-radius:2px;background:'+C.b+';margin:12px auto 4px"></div>’;
inner+=’<div class="shh"><span class="sht">✎ 編輯紀錄</span><button class="shc" data-act="ovClose">✕</button></div>’;
inner+=’<div class="shb" style="display:flex;flex-direction:column;gap:12px">’;
inner+=’<div><span class="tlbl" style="font-size:11px">消費金額</span>’;
inner+=’<div style="position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:'+C.t3+';font-size:16px">$</span>’;
inner+=’<input id="er-amt" class="si" type="number" value="'+f.amt+'" style="padding-left:28px;font-size:16px"></div></div>’;
inner+=’<div><span class="tlbl" style="font-size:11px">消費類別</span>’;
inner+=’<select id="er-cat" class="si">’+catOpts+’</select></div>’;
inner+=’<div><span class="tlbl" style="font-size:11px">信用卡</span>’;
inner+=’<select id="er-cid" class="si">’+cardOpts+’</select></div>’;
inner+=’<div><span class="tlbl" style="font-size:11px">備註</span>’;
inner+=’<input id="er-note" class="si" type="text" value="'+esc(f.note||'')+'" placeholder="（可略）"></div>’;
inner+=’<div><span class="tlbl" style="font-size:11px">日期</span>’;
inner+=’<input id="er-dt" class="si" type="date" value="'+f.dt+'" max="'+td()+'"></div>’;
inner+=’<div style="height:8px"></div></div>’;
inner+=’<div class="shf"><button class="cancbtn" data-act="ovClose">取消</button><button class="savbtn" id="er-save">儲存</button></div></div>’;
ov.innerHTML=inner;ov.querySelector(’.sh’).onclick=function(e){e.stopPropagation();};
document.getElementById(‘er-save’).onclick=function(){
var amt=parseFloat(document.getElementById(‘er-amt’).value)||0;
if(!amt){toast(‘請輸入金額’,‘err’);return;}
var i=S.recs.findIndex(function(x){return x.id===id;});
if(i>=0){
S.recs[i].amt=amt;
S.recs[i].cat=document.getElementById(‘er-cat’).value;
S.recs[i].cid=document.getElementById(‘er-cid’).value;
S.recs[i].note=document.getElementById(‘er-note’).value;
S.recs[i].dt=document.getElementById(‘er-dt’).value;
}
ov.remove();save();toast(‘已更新 ✓’);render();
};
bindBtns();
}
document.body.appendChild(ov);bldE();
}
try{render();}catch(e){console.error(e);}save();

</script>
