<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#7c6cfc"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>💳 信用卡回饋追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4ff;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:opacity(.5)}
input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;background:none;width:22px;height:22px;border-radius:50%}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:50%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f0f4ff}::-webkit-scrollbar-thumb{background:#d0d8ff;border-radius:2px}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.up{animation:up .3s ease forwards}.fade{animation:fade .2s ease}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer}
input{font-family:'Noto Sans TC',sans-serif}
button:active{transform:scale(.97)}
#app{display:flex;justify-content:center;min-height:100vh}
#main{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh}
#header{background:linear-gradient(135deg,#7c6cfc,#38b6ff);padding:24px 20px 20px;position:relative;overflow:hidden}
#header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12);pointer-events:none}
.month-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.mbtn{background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center}
#mlabel{font-size:15px;font-weight:700;color:white;flex:1}
.stats{display:flex}.stat{flex:1;text-align:center}
.sval{font-size:20px;font-weight:900;color:white;letter-spacing:-1px}
.slbl{font-size:10px;color:rgba(255,255,255,.7);margin-top:3px;letter-spacing:1px}
#sind{display:flex;justify-content:flex-end;margin-top:10px;min-height:16px;font-size:11px}
#nav{display:flex;background:white;border-bottom:1px solid #d0d8ff;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px #7c6cfc18}
.nb{flex:1;padding:12px 0 10px;background:none;border:none;color:#8b93c8;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2.5px solid transparent;font-weight:400;transition:color .15s;font-size:10px}
.nb.on{color:#7c6cfc;border-bottom-color:#7c6cfc;font-weight:700}
.ni{font-size:18px;line-height:1}
#content{flex:1;padding:16px 14px 48px}
.sl{font-size:11px;font-weight:700;letter-spacing:2px;color:#8b93c8;text-transform:uppercase;margin-bottom:10px}
.sl.mt{margin-top:20px}
.cb{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff;opacity:0}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.cch{font-size:11px;color:#8b93c8;margin-top:6px}
.rw{position:relative}.rpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.rrow{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.ramt{font-size:26px;font-weight:900}.rsub{font-size:11px;color:#8b93c8}
.rlbl{font-size:13px;font-weight:700;text-align:right}.rlbl2{font-size:11px;color:#8b93c8;margin-top:2px;text-align:right}
.pt{height:6px;background:#e8eeff;border-radius:3px;overflow:hidden;margin-bottom:10px}
.pf{height:100%;border-radius:3px;transition:width .6s ease}
.cf{display:flex;justify-content:space-between;font-size:11px;color:#8b93c8}
.badge{display:inline-flex;align-items:center;border-radius:20px;font-size:12px;font-weight:700;padding:4px 14px;border:1px solid}
.bsm{font-size:10px;padding:2px 8px}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ccell{background:white;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff}
.fl{font-size:11px;color:#8b93c8;font-weight:600;letter-spacing:1px;display:block;margin-bottom:6px}
.fi{width:100%;background:white;border:1.5px solid #d0d8ff;border-radius:12px;padding:13px 14px;color:#1e1b4b;font-size:15px;outline:none}
.fi:focus{border-color:#7c6cfc;box-shadow:0 0 0 3px #7c6cfc22}
.cr{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:20px;border:1.5px solid #d0d8ff;background:white;color:#4b5080;font-size:12px;font-weight:400;transition:all .15s}
.chip.on{background:#7c6cfc;border-color:#7c6cfc;color:white;font-weight:700;box-shadow:0 2px 8px #7c6cfc44}
.sbtn{background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;color:white;border-radius:14px;padding:16px;font-size:15px;font-weight:800;width:100%;letter-spacing:2px;box-shadow:0 4px 20px #7c6cfc44}
.abtn{background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:10px;padding:8px 16px;color:white;font-size:12px;font-weight:700;box-shadow:0 2px 10px #7c6cfc44}
.csel{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:14px;border:1.5px solid #d0d8ff;background:white;width:100%;text-align:left;transition:all .15s;box-shadow:0 2px 12px #7c6cfc18;margin-bottom:8px}
.ri{display:flex;align-items:center;gap:12px;background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px #7c6cfc18;border-left:4px solid}
.rl{flex:1}.rm{display:flex;align-items:center;gap:8px;margin-bottom:4px}.rd{font-size:10px;color:#8b93c8;margin-left:auto}
.smb{border-radius:16px;padding:14px;margin-bottom:14px;border:1.5px solid}
.smo{margin-top:10px;border-top:1px solid #d0d8ff;padding-top:10px}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.mc{text-align:center;background:#f0f4ff;border-radius:10px;padding:8px 4px}
.mi{font-size:11px;color:#8b93c8;line-height:1.9;margin-top:4px}
.cat-mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.camc{background:white;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff}
.dcard{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px #7c6cfc18;border:1px solid #d0d8ff;display:flex;justify-content:space-between;align-items:center}
.dbtn{width:100%;background:white;border-radius:14px;padding:14px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.sh{background:#f0f4ff;border-radius:24px 24px 0 0;width:100%;max-width:480px;box-shadow:0 -8px 40px #7c6cfc22;border:1px solid #d0d8ff;max-height:92vh;display:flex;flex-direction:column}
.shd{display:flex;justify-content:center;padding:12px 0 4px}.shdb{width:36px;height:4px;border-radius:2px;background:#d0d8ff}
.shh{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 14px;border-bottom:1px solid #d0d8ff}
.sht{font-size:17px;font-weight:800;color:#1e1b4b}
.shc{background:#e8eeff;border:none;color:#4b5080;width:28px;height:28px;border-radius:8px;font-size:16px}
.shb{flex:1;overflow-y:auto;padding:14px 16px 8px}
.shf{display:flex;gap:10px;padding:12px 16px 24px;border-top:1px solid #d0d8ff}
.sinp{width:100%;background:white;border:1.5px solid #d0d8ff;border-radius:10px;padding:11px 12px;color:#1e1b4b;font-size:14px;outline:none}
.sinp.err{border-color:#f43f5e}.ferr{font-size:11px;color:#f43f5e;margin-top:3px}
.hb{font-size:12px;color:#7c6cfc;background:#7c6cfc12;border:1px solid #7c6cfc30;border-radius:10px;padding:9px 14px;margin-bottom:10px}
.cancbtn{flex:1;background:#e8eeff;border:none;border-radius:12px;padding:14px 0;color:#4b5080;font-size:14px;font-weight:700}
.savbtn{flex:2;background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:12px;padding:14px 0;color:white;font-size:14px;font-weight:800;box-shadow:0 4px 16px #7c6cfc44}
.delbtn{background:white;border:1.5px solid rgba(244,63,94,.3);border-radius:12px;padding:12px 14px;color:#f43f5e;font-size:13px;font-weight:700}
.cdot{width:22px;height:22px;border-radius:50%;border:2.5px solid transparent}.cdot.sel{border-color:#333}
.emb{width:56px;height:52px;border-radius:12px;border:1.5px solid #d0d8ff;background:white;font-size:24px;display:flex;align-items:center;justify-content:center}
.emp{position:absolute;top:60px;left:0;background:white;border:1px solid #d0d8ff;border-radius:16px;padding:10px;z-index:20;width:240px;display:flex;flex-wrap:wrap;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.emo{width:34px;height:34px;border-radius:8px;border:none;background:transparent;font-size:18px;cursor:pointer}.emo.sel{background:#e8eeff}
.conf{background:white;border-radius:20px;padding:28px;width:300px;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.empty{text-align:center;color:#8b93c8;padding:60px 20px;line-height:2}
.gbtn{margin-top:16px;background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:12px;padding:10px 24px;color:white;font-size:13px;font-weight:700;box-shadow:0 4px 16px #7c6cfc44}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;color:white;z-index:3000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15);display:none;animation:up .2s ease}
</style>
</head>
<body>
<div id="app"><div id="main">
  <div id="header">
    <div class="month-row">
      <button class="mbtn" id="pm">&#8249;</button>
      <span id="mlabel"></span>
      <button class="mbtn" id="nm">&#8250;</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="sval" id="hs">$0</div><div class="slbl">本月消費</div></div>
      <div class="stat"><div class="sval" id="hr">$0</div><div class="slbl">累積回饋</div></div>
      <div class="stat"><div class="sval" id="hc">0</div><div class="slbl">消費筆數</div></div>
    </div>
    <div id="sind"></div>
  </div>
  <nav id="nav">
    <button class="nb on" data-v="home"><span class="ni">&#9638;</span>總覽</button>
    <button class="nb" data-v="add"><span class="ni">&#8853;</span>記帳</button>
    <button class="nb" data-v="history"><span class="ni">&#8801;</span>紀錄</button>
    <button class="nb" data-v="cards"><span class="ni">&#9672;</span>管理</button>
  </nav>
  <div id="content"></div>
</div></div>
<div id="toast"></div>
<input type="file" id="fimp" accept=".json" style="display:none">

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
var C={primary:'#7c6cfc',accent:'#38b6ff',pink:'#f472b6',text:'#1e1b4b',text2:'#4b5080',text3:'#8b93c8',danger:'#f43f5e',warn:'#f59e0b',ok:'#10b981',bg:'#f0f4ff',bg3:'#e8eeff',border:'#d0d8ff'};
var EMOJIS=['🍜','🍣','☕','🍺','🛍','👗','👟','💄','🚇','🚗','⛽','✈️','🛒','🏬','🏪','🏦','🎬','🎮','🎵','📚','💊','🏥','🏋️','⛳','📱','💻','🖥️','📷','🎁','💍','🏠','🔧','🌿','🐾','📦','💰','🍎','🛞','🧴','🧾','🎓','🏖️','🚿','🪴','🐶'];
var DCATS=[
  {id:'dining',emoji:'🍜',name:'餐飲',channels:['all','dining'],builtIn:true},
  {id:'shopping',emoji:'🛍',name:'購物',channels:['all','online'],builtIn:true},
  {id:'online',emoji:'💻',name:'網購',channels:['all','online'],builtIn:true},
  {id:'transport',emoji:'🚇',name:'交通',channels:['all'],builtIn:true},
  {id:'grocery',emoji:'🛒',name:'超市',channels:['all','supermarket'],builtIn:true},
  {id:'department',emoji:'🏬',name:'百貨',channels:['all'],builtIn:true},
  {id:'wholesale',emoji:'🏪',name:'量販',channels:['all','supermarket'],builtIn:true},
  {id:'gas',emoji:'⛽',name:'加油',channels:['all'],builtIn:true},
  {id:'entertainment',emoji:'🎬',name:'娛樂',channels:['all','online'],builtIn:true},
  {id:'linepay',emoji:'📱',name:'LINE Pay',channels:['all','linepay'],builtIn:true},
  {id:'applepay',emoji:'🍎',name:'Apple Pay',channels:['all'],builtIn:true},
  {id:'jkopay',emoji:'🏪',name:'街口',channels:['all','jkopay'],builtIn:true},
  {id:'other',emoji:'📦',name:'其他',channels:['all'],builtIn:true}
];
var CHOPTS=[{id:'all',l:'所有通路'},{id:'online',l:'網路消費'},{id:'linepay',l:'LINE Pay'},{id:'jkopay',l:'街口支付'},{id:'supermarket',l:'超市/量販'},{id:'dining',l:'餐飲消費'}];
var CYOPTS=[{id:'monthly',l:'每月重置'},{id:'quarterly',l:'每季重置'},{id:'yearly',l:'每年重置'}];
var APS=['#38b6ff','#7c6cfc','#f472b6','#06c87a','#f59e0b','#f43f5e','#34d399','#fbbf24','#60a5fa','#a78bfa','#fb7185','#4ade80'];
var BPS=['#1e3a5f','#2d1b69','#5b0e2d','#064e3b','#1e1b4b','#0c4a6e','#3b0764','#052e16'];
var DCARDS=[
  {id:'fen',name:'永豐大戶卡',bank:'永豐銀行',color:'#1e3a5f',accent:'#38b6ff',rate:2.5,cap:400,cycle:'monthly',resetDay:1,channels:['all'],channelLabel:'所有通路',note:'每月回饋上限 $400'},
  {id:'lp',name:'LINE Pay 卡',bank:'中國信託',color:'#2d1b69',accent:'#7c6cfc',rate:3.0,cap:500,cycle:'monthly',resetDay:1,channels:['linepay'],channelLabel:'LINE Pay 消費',note:'僅限 LINE Pay 付款'},
  {id:'jko',name:'街口聯名卡',bank:'第一銀行',color:'#5b0e2d',accent:'#f472b6',rate:2.0,cap:300,cycle:'monthly',resetDay:1,channels:['jkopay'],channelLabel:'街口支付',note:'僅限街口支付'},
  {id:'ubt',name:'Ubot 鈦金卡',bank:'聯邦銀行',color:'#064e3b',accent:'#34d399',rate:2.2,cap:600,cycle:'monthly',resetDay:1,channels:['online'],channelLabel:'網路消費',note:'網路刷卡 2.2%'}
];

// ── STORAGE ──────────────────────────────────────────────────────────────────
var K={ca:'ct_ca6',re:'ct_re6',ct:'ct_ct6',ls:'ct_ls6'};
function lg(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function nm(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function td(){return new Date().toISOString().slice(0,10);}
function uid(){return Math.random().toString(36).slice(2,9);}
function fs(n){return '$'+Math.round(n).toLocaleString('zh-TW');}
function fd(d){var dt=new Date(d);return (dt.getMonth()+1)+'/'+dt.getDate();}
function ft(d){if(!d)return'';var dt=new Date(d);return String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}
function msp(c){return c.cap/(c.rate/100);}

function getSmp(){
  var m=nm();
  return [
    {id:1,cardId:'fen',amount:3200,catId:'online',note:'momo購物',date:m+'-05'},
    {id:2,cardId:'fen',amount:5500,catId:'dining',note:'家族聚餐',date:m+'-10'},
    {id:3,cardId:'lp',amount:420,catId:'linepay',note:'LINE Pay 早午餐',date:m+'-12'},
    {id:4,cardId:'jko',amount:1280,catId:'wholesale',note:'好市多',date:m+'-14'},
    {id:5,cardId:'ubt',amount:2400,catId:'online',note:'蝦皮購物',date:m+'-16'},
    {id:6,cardId:'fen',amount:1800,catId:'gas',note:'加油',date:m+'-18'},
    {id:7,cardId:'lp',amount:3600,catId:'applepay',note:'Apple Pay 百貨',date:m+'-20'}
  ];
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var S={
  cards:lg(K.ca,DCARDS),
  recs:lg(K.re,getSmp()),
  cats:lg(K.ct,DCATS),
  view:'home',
  month:nm(),
  form:{cardId:'',amt:'',catId:'dining',note:'',date:td()}
};
if(S.cards.length&&!S.form.cardId)S.form.cardId=S.cards[0].id;

// ── AUTO-SAVE ─────────────────────────────────────────────────────────────────
var svt=null,svs='idle';
function save(){
  svs='saving';rsi();clearTimeout(svt);
  svt=setTimeout(function(){
    ls(K.ca,S.cards);ls(K.re,S.recs);ls(K.ct,S.cats);
    localStorage.setItem(K.ls,new Date().toISOString());
    svs='saved';rsi();
    setTimeout(function(){svs='idle';rsi();},2000);
  },800);
}
function rsi(){
  var el=document.getElementById('sind');if(!el)return;
  if(svs==='saving'){
    el.innerHTML='<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.7)"><span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;animation:pulse 1s infinite"></span>儲存中…</span>';
  }else if(svs==='saved'){
    el.innerHTML='<span style="font-size:11px;color:#84ffda">✓ 已自動存檔</span>';
  }else{
    var t=localStorage.getItem(K.ls);
    el.innerHTML=t?'<span style="font-size:11px;color:rgba(255,255,255,.6)">上次存檔 '+ft(new Date(t))+'</span>':'';
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
var tt;
function toast(msg,type){
  type=type||'ok';
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='err'?C.danger:type==='warn'?C.warn:C.ok;
  el.style.display='block';
  clearTimeout(tt);tt=setTimeout(function(){el.style.display='none';},2600);
}

// ── RING ──────────────────────────────────────────────────────────────────────
function ring(prog,size,col){
  var s=6,r=(size-s)/2,ci=2*Math.PI*r;
  var co=prog>=1?C.danger:prog>0.8?C.warn:col;
  var off=ci*(1-Math.min(prog,1));
  return '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)">'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+C.bg3+'" stroke-width="'+s+'"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+co+'" stroke-width="'+s+'"'+
    ' stroke-dasharray="'+ci+'" stroke-dashoffset="'+off+'" stroke-linecap="round"'+
    ' style="transition:stroke-dashoffset .6s ease"/></svg>';
}

// ── BADGE ─────────────────────────────────────────────────────────────────────
function badge(card,sm){
  return '<span class="badge'+(sm?' bsm':'')+'" style="background:'+card.color+';color:'+card.accent+';border-color:'+card.accent+'55;box-shadow:0 2px 8px '+card.accent+'22">'+card.name+'</span>';
}

// ── CARD STATS ────────────────────────────────────────────────────────────────
function cstat(card){
  var r=S.recs.filter(function(x){return x.cardId===card.id&&x.date.startsWith(S.month);});
  var sp=r.reduce(function(s,x){return s+x.amount;},0);
  var rw=Math.min(sp*(card.rate/100),card.cap);
  var ms=msp(card);
  return{sp:sp,rw:rw,prog:Math.min(sp/ms,1),rem:Math.max(ms-sp,0),rl:Math.max(card.cap-rw,0),r:r};
}

function rank(amt,catId){
  var cat=S.cats.find(function(c){return c.id===catId;});
  return S.cards.map(function(card){
    // 如果卡片通路是 all，或類別通路包含 all，視為符合
    var ok=card.channels.indexOf('all')>=0||(cat&&cat.channels&&cat.channels.some(function(ch){return card.channels.indexOf(ch)>=0;}));
    if(!ok)return{card:card,tr:0,ob:0,score:-999,reason:'通路不符',dis:true};
    var st=cstat(card),ns=st.sp+amt;
    var nr=Math.min(ns*(card.rate/100),card.cap),tr=nr-st.rw,ob=Math.max(ns-msp(card),0);
    return{card:card,tr:tr,ob:ob,score:tr-ob*.5,reason:ob>0?'超出上限 '+fs(ob):'可獲回饋 '+fs(tr),dis:false};
  }).sort(function(a,b){return b.score-a.score;});
}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exp(){
  var data=JSON.stringify({v:6,at:new Date().toISOString(),cards:S.cards,recs:S.recs,cats:S.cats},null,2);
  var b=new Blob([data],{type:'application/json'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=u;a.download='card-tracker-'+td()+'.json';a.click();
  URL.revokeObjectURL(u);toast('匯出成功 ✓');
}
document.getElementById('fimp').onchange=function(){
  var file=this.files&&this.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!d.cards)throw new Error('格式不符');
      S.cards=d.cards;S.recs=d.recs||d.records||[];
      if(d.cats)S.cats=d.cats;
      save();toast('匯入完成：'+S.cards.length+'張卡');render();
    }catch(er){toast('匯入失敗','err');}
  };
  reader.readAsText(file);this.value='';
};

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  rh();
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.dataset.v===S.view);});
  var el=document.getElementById('content');
  el.className='fade';
  if(S.view==='home')el.innerHTML=vHome();
  else if(S.view==='add'){el.innerHTML=vAdd();bindAddListeners();}
  else if(S.view==='history')el.innerHTML=vHistory();
  else el.innerHTML=vCards();
  setTimeout(function(){
    var e=document.getElementById('si2');
    if(e){var t=localStorage.getItem(K.ls);e.textContent=t?'上次存檔 '+ft(new Date(t)):'';}
  },0);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function sv(v){S.view=v;render();}

function addRec(){
  syncFormInputs();
  var amt=parseFloat(S.form.amt)||0;
  if(!amt||amt<=0){toast('請輸入正確金額','err');return;}
  if(!S.form.cardId){toast('請選擇信用卡','err');return;}
  S.recs.unshift({cardId:S.form.cardId,amount:amt,catId:S.form.catId,note:S.form.note,date:S.form.date,id:Date.now()});
  S.form.amt='';S.form.note='';S.form.date=td();
  save();toast('記帳成功 ✓');render();
}

function clrRecs(){
  if(confirm('確定清除所有消費紀錄？')){S.recs=[];save();toast('已清除','warn');render();}
}

    if(ch==='all'){f.channels=['all'];redrawChips();return;}
    var cur=f.channels.filter(function(c){return c!=='all';});
    var idx=cur.indexOf(ch);
    if(idx>=0)cur.splice(idx,1);else cur.push(ch);
    f.channels=cur.length===0?['all']:cur;redrawChips();

  window.ce_addCh=function(){
    // 用內建 input 替代 prompt（prompt 在部分環境被封鎖）
    var existing=document.getElementById('custom-ch-input-row');
    if(existing){existing.remove();return;}

    row.id='custom-ch-input-row';
    row.style.cssText='display:flex;gap:8px;align-items:center;margin-top:8px;width:100%';

      '<button onclick="document.getElementById(\'custom-ch-input-row\').remove()" style="padding:9px 10px;border-radius:10px;border:1px solid #d0d8ff;background:white;color:#8b93c8;font-size:12px">✕</button>';
    var chips=document.getElementById('ch-chips');

    setTimeout(function(){var inp=document.getElementById('custom-ch-val');if(inp)inp.focus();},100);
  };
  window.ce_confirmCh=function(){
    var inp=document.getElementById('custom-ch-val');
    if(!inp||!inp.value.trim()){toast('請輸入通路名稱','err');return;}
    var name=inp.value.trim();
    var id='custom_'+uid();
    var ch={id:id,l:name};
    f.customChannels.push(ch);
    f.channels=f.channels.filter(function(c){return c!=='all';});
    f.channels.push(id);
    if(!f.channels.length)f.channels=['all'];
    var row=document.getElementById('custom-ch-input-row');if(row)row.remove();
    redrawChips();
  };
  window.ce_save=function(){
    // 讀取所有輸入值
    var cenEl=document.getElementById('cen');if(cenEl)f.name=cenEl.value;
    var cbnkEl=document.getElementById('cbnk');if(cbnkEl)f.bank=cbnkEl.value;
    var cnoteEl=document.getElementById('cnote');if(cnoteEl)f.note=cnoteEl.value;
    var crateEl=document.getElementById('crate');if(crateEl)f.rate=crateEl.value;
    var ccapEl=document.getElementById('ccap');if(ccapEl)f.cap=ccapEl.value;
    var crdayEl=document.getElementById('crday');if(crdayEl)f.resetDay=crdayEl.value;
    var e={};
    if(!f.name||!f.name.trim())e.n='請輸入卡片名稱';
    if(!f.rate||isNaN(+f.rate)||+f.rate<=0||+f.rate>100)e.r='回饋率需介於 0–100%';
    if(!f.cap||isNaN(+f.cap)||+f.cap<=0)e.c='請輸入正確上限';
    if(Object.keys(e).length){
      var ne=document.getElementById('cen-e'),re=document.getElementById('cer-e'),ce=document.getElementById('cec-e');
      if(ne)ne.textContent=e.n||'';if(re)re.textContent=e.r||'';if(ce)ce.textContent=e.c||'';
      return;
    }
    var chs=f.channels.length?f.channels:['all'];
    var allCh=getAllChannels();
    var cl;
    if(chs.indexOf('all')>=0){cl='所有通路';}
    else{cl=chs.map(function(ch){var o=allCh.find(function(x){return x.id===ch;});return o?o.l:ch;}).join('、');}
    var rday=+f.resetDay||1;
    var rdayLabel=rday>=31?'月底':rday+'號';
    var saved=Object.assign({},f,{
      id:f.id||uid(),rate:+f.rate,cap:+f.cap,resetDay:rday,
      channels:chs,channelLabel:cl,
      customChannels:f.customChannels||[]
    });
    var idx=S.cards.findIndex(function(c){return c.id===saved.id;});
    if(idx>=0)S.cards[idx]=saved;else S.cards.push(saved);
    if(!S.form.cardId&&S.cards.length)S.form.cardId=S.cards[0].id;
    ov.remove();save();toast('卡片已儲存 ✓');render();
  };
  window.ce_del=function(id){
    S.cards=S.cards.filter(function(c){return c.id!==id;});
    S.recs=S.recs.filter(function(r){return r.cardId!==id;});
    ov.remove();save();toast('卡片已刪除','warn');render();
  };
  document.body.appendChild(ov);
}

    var nameEl=document.getElementById('cat-name');if(nameEl)f.name=nameEl.value;
    if(!f.name.trim()){f._e='請輸入類別名稱';rs();return;}
    var saved={id:f.id||uid(),emoji:f.emoji,name:f.name.trim(),channels:f.channels,builtIn:false};
    var idx=S.cats.findIndex(function(c){return c.id===saved.id;});
    if(idx>=0)S.cats[idx]=saved;else S.cats.push(saved);
    ov.remove();save();toast('類別已儲存 ✓');render();
  };
  window.cat_del=function(id){
    S.cats=S.cats.filter(function(c){return c.id!==id;});
    ov.remove();save();toast('類別已刪除','warn');render();
  };
  document.body.appendChild(ov);rs();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
save();
</script>
